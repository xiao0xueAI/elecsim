<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ElecSim Studio Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 600px; text-align: center; }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .version { color: #8b949e; font-size: 14px; margin-bottom: 32px; }
    .desc { color: #8b949e; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      transition: all .2s;
      border: 1px solid #238636;
    }
    .btn:hover { background: linear-gradient(135deg, #2ea043, #3fb950); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(46,160,67,.3); }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-top: 40px; text-align: left; }
    .feature { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .feature .icon { font-size: 24px; margin-bottom: 8px; }
    .feature .title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .feature .text { font-size: 12px; color: #8b949e; }
    .footer { margin-top: 48px; font-size: 12px; color: #484f58; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>ElecSim Studio Pro</h1>
    <p class="version">v2026.05.06 — 电工电路仿真与工作原理可视化</p>
    <p class="desc">
      基于浏览器的交互式电路仿真工具。支持拖放搭建电路、实时仿真计算、电流可视化动画。
    </p>
    <a href="index.html" class="btn">🚀 打开工具</a>
    <div class="features">
      <div class="feature"><div class="icon">🔌</div><div class="title">丰富的元件库</div><div class="text">电源、电阻、电容、LED、开关等</div></div>
      <div class="feature"><div class="icon">⚡</div><div class="title">实时仿真</div><div class="text">电压/电流/功率实时计算</div></div>
      <div class="feature"><div class="icon">💡</div><div class="title">可视化效果</div><div class="text">LED发光、电流流向动画</div></div>
      <div class="feature"><div class="icon">🔬</div><div class="title">X光视图</div><div class="text">透视查看元件内部结构</div></div>
    </div>
    <div class="footer">MIT License · Built with HTML5 Canvas</div>
  </div>
</body>
</html>
